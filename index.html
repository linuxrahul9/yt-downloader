<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault | Premium HD Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-text {
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-glow:focus {
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
            border-color: #60a5fa;
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .shimmer:hover::after { left: 100%; }
    </style>
</head>
<body class="p-6">

    <!-- Decorative Background Orbs -->
    <div class="absolute top-20 left-20 w-64 h-64 bg-blue-600/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-80 h-80 bg-purple-600/20 rounded-full blur-[120px] animate-pulse"></div>

    <main class="w-full max-w-2xl z-10">
        <div class="text-center mb-10 animate-float">
            <h1 class="text-5xl font-extrabold mb-4 tracking-tight">Stream<span class="gradient-text">Vault</span></h1>
            <p id="status-message" class="text-slate-400 text-lg transition-all duration-300">Ready to fetch high-quality content.</p>
        </div>

        <div class="glass-card rounded-3xl p-8 md:p-12 transition-all duration-500 hover:border-blue-500/30">
            
            <!-- Link Input -->
            <div class="relative mb-8">
                <input type="text" id="video-url"
                       placeholder="Paste YouTube link here..." 
                       class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-5 px-6 pl-14 text-white placeholder-slate-500 outline-none transition-all input-glow text-lg">
                <i class="fa-brands fa-youtube absolute left-5 top-1/2 -translate-y-1/2 text-red-500 text-2xl"></i>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Format Toggle -->
                <div>
                    <label class="block text-slate-400 text-sm mb-3 ml-1">Format</label>
                    <div class="flex bg-slate-900/80 p-1 rounded-xl border border-slate-700">
                        <button id="btn-mp4" onclick="setFormat('mp4')" class="flex-1 py-2 px-4 rounded-lg bg-blue-600 text-white font-semibold transition-all">
                            <i class="fa-solid fa-video mr-2"></i> MP4
                        </button>
                        <button id="btn-mp3" onclick="setFormat('mp3')" class="flex-1 py-2 px-4 rounded-lg text-slate-400 hover:text-white transition-all">
                            <i class="fa-solid fa-music mr-2"></i> MP3
                        </button>
                    </div>
                </div>

                <!-- Quality Select -->
                <div>
                    <label class="block text-slate-400 text-sm mb-3 ml-1">Quality</label>
                    <select id="quality-select" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl py-2.5 px-4 outline-none focus:border-blue-500 appearance-none cursor-pointer">
                        <option value="best">Highest Available</option>
                        <option value="1080">1080p (Full HD)</option>
                        <option value="720">720p (HD)</option>
                        <option value="480">480p</option>
                    </select>
                </div>
            </div>

            <!-- Action Button -->
            <button id="download-btn" onclick="startDownload()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-5 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-blue-900/20 shimmer">
                <span id="btn-text"><i class="fa-solid fa-bolt mr-2"></i> FETCH VIDEO</span>
            </button>
        </div>

        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p>&copy; 2026 StreamVault. Fast. Secure. Free.</p>
        </footer>
    </main>

    <script>
        let selectedFormat = 'mp4';

        function setFormat(format) {
            selectedFormat = format;
            const mp4Btn = document.getElementById('btn-mp4');
            const mp3Btn = document.getElementById('btn-mp3');
            
            if(format === 'mp4') {
                mp4Btn.className = "flex-1 py-2 px-4 rounded-lg bg-blue-600 text-white font-semibold transition-all";
                mp3Btn.className = "flex-1 py-2 px-4 rounded-lg text-slate-400 hover:text-white transition-all";
            } else {
                mp3Btn.className = "flex-1 py-2 px-4 rounded-lg bg-blue-600 text-white font-semibold transition-all";
                mp4Btn.className = "flex-1 py-2 px-4 rounded-lg text-slate-400 hover:text-white transition-all";
            }
        }

        async function startDownload() {
            const urlInput = document.getElementById('video-url');
            const statusText = document.getElementById('status-message');
            const btn = document.getElementById('download-btn');
            const btnText = document.getElementById('btn-text');
            
            if(!urlInput.value) {
                alert("Please paste a YouTube URL!");
                return;
            }

            // Step 1: Initial Visual Feedback
            statusText.classList.remove('text-slate-400', 'text-green-400', 'text-red-400');
            statusText.classList.add('text-blue-400');
            statusText.innerText = "⏳ 1/2: Downloading from YouTube...";
            
            btn.disabled = true;
            btnText.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> PROCESSING...';

            // Step 2: Inform the user when merging starts (usually after 10-15 seconds)
            const mergingTimer = setTimeout(() => {
                if(btn.disabled) {
                    statusText.innerText = "⚙️ 2/2: Merging High-Quality Audio & Video...";
                }
            }, 12000);

            try {
                // Change to your actual server IP if testing on local network
                const response = await fetch('http://127.0.0.1:5000/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        url: urlInput.value, 
                        format: selectedFormat 
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    
                    const timestamp = new Date().getTime();
                    a.download = selectedFormat === 'mp4' ? `StreamVault_${timestamp}.mp4` : `StreamVault_${timestamp}.mp3`;
                    
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    
                    statusText.classList.replace('text-blue-400', 'text-green-400');
                    statusText.innerText = "✅ Download started successfully!";
                } else {
                    const err = await response.json();
                    statusText.classList.replace('text-blue-400', 'text-red-400');
                    statusText.innerText = "❌ Error: " + (err.error || "Failed to download");
                }
            } catch (err) {
                console.error(err);
                statusText.classList.replace('text-blue-400', 'text-red-400');
                statusText.innerText = "❌ Backend server is not running!";
            } finally {
                clearTimeout(mergingTimer);
                btn.disabled = false;
                btnText.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> FETCH VIDEO';
            }
        }
    </script>
</body>
</html>
